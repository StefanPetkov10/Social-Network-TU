name: Function CI and Deployment

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/SocialMedia.ImageResize/**'
  workflow_dispatch:

env:
  FUNCTION_APP_NAME: 'func-socialnetwork-resize'
  FUNCTION_PROJECT: 'backend/SocialMedia.ImageResize/SocialMedia.ImageResize.csproj'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Function
        run: dotnet publish ${{ env.FUNCTION_PROJECT }} -c Release -o ./function_output

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: ./function_output