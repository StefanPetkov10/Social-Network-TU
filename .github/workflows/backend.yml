name: Backend CI and Deployment

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch: 

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:"StefanPetkov10_Social-Network-TU" /o:"stefanpetkov10" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      - name: Restore dependencies
        run: dotnet restore backend/SocialMedia.sln

      - name: Build
        run: dotnet build backend/SocialMedia.sln --no-restore

      - name: Run Tests and Collect Coverage
        run: dotnet test backend/SocialMedia.sln --no-build --verbosity normal --collect:"XPlat Code Coverage;Format=opencover" --results-directory TestResults

      - name: End SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Publish project for deployment
        if: github.event_name == 'push'
        run: dotnet publish backend/SocialMedia.Api/SocialMedia.Api.csproj -c Release -o ./publish_output

      - name: Upload artifact for deployment
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./publish_output

  deploy:
    if: github.event_name == 'push'
    needs: build-and-analyze
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ./publish_output

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Azure App Service Settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name "SocialMedia-TU" \
              --resource-group "SocialMedia-TU_group" \
              --settings \
                FrontendUrl="https://stefanpetkov10.github.io/Social-Network-TU" \
                Email__Smtp__Password="${{ secrets.EMAIL_PASSWORD }}" \
                JWT__SecretKey="${{ secrets.JWT_SECRET_KEY }}" \
                ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION_STRING }}" \
                Otp__Secret="${{ secrets.JWT_SECRET_KEY }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SocialMedia-TU' 
          package: ./publish_output